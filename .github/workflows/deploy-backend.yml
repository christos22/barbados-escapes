name: Deploy Backend to InMotion

on:
  push:
    branches: [main]
    paths:
      - '.cpanel.yml'
      - 'wp-content/themes/gutenberg-lab-vvm/**'
      - 'wp-content/plugins/gutenberg-lab-blocks/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            set -e

            cd /home/grapsa5/repositories/barbados-escapes
            git fetch origin main
            git checkout main
            git pull origin main

            # Keep these copy paths aligned with the cPanel deploy config.
            export THEMEPATH=/home/grapsa5/barbadosescapes.verseandvision.ca/wp-content/themes/gutenberg-lab-vvm
            mkdir -p $THEMEPATH
            cp -R wp-content/themes/gutenberg-lab-vvm/* $THEMEPATH/

            export PLUGINPATH=/home/grapsa5/barbadosescapes.verseandvision.ca/wp-content/plugins/gutenberg-lab-blocks
            mkdir -p $PLUGINPATH
            cp -R wp-content/plugins/gutenberg-lab-blocks/* $PLUGINPATH/

            echo "Deployment complete."

      - name: Verify Deployment
        env:
          DEPLOY_VERIFY_BASIC_AUTH_USERNAME: ${{ secrets.DEPLOY_VERIFY_BASIC_AUTH_USERNAME }}
          DEPLOY_VERIFY_BASIC_AUTH_PASSWORD: ${{ secrets.DEPLOY_VERIFY_BASIC_AUTH_PASSWORD }}
        run: |
          sleep 5

          request_status() {
            local url="$1"
            local -a curl_args=(
              -s
              -o /dev/null
              -w "%{http_code}"
              -A "Mozilla/5.0"
            )

            if [ -n "$DEPLOY_VERIFY_BASIC_AUTH_USERNAME" ] && [ -n "$DEPLOY_VERIFY_BASIC_AUTH_PASSWORD" ]; then
              curl_args+=( --user "${DEPLOY_VERIFY_BASIC_AUTH_USERNAME}:${DEPLOY_VERIFY_BASIC_AUTH_PASSWORD}" )
            fi

            curl "${curl_args[@]}" "$url"
          }

          PRIMARY_URL="https://barbadosescapes.verseandvision.ca/wp-json/"
          FALLBACK_URL="https://barbadosescapes.verseandvision.ca/?rest_route=/"
          HTTP_STATUS=$(request_status "$PRIMARY_URL")

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "WordPress API responding correctly at /wp-json/"
            exit 0
          fi

          # A 404 here usually means rewrite routing is broken, so try the
          # query-string fallback before failing the deployment.
          if [ "$HTTP_STATUS" -eq 404 ]; then
            FALLBACK_STATUS=$(request_status "$FALLBACK_URL")

            if [ "$FALLBACK_STATUS" -eq 200 ]; then
              echo "WordPress API responding correctly via ?rest_route=/"
              exit 0
            fi

            echo "WordPress REST routing check failed: /wp-json/ returned 404 and ?rest_route=/ returned $FALLBACK_STATUS"
            exit 1
          fi

          if [ "$HTTP_STATUS" -eq 401 ]; then
            if [ -z "$DEPLOY_VERIFY_BASIC_AUTH_USERNAME" ] || [ -z "$DEPLOY_VERIFY_BASIC_AUTH_PASSWORD" ]; then
              echo "WordPress API is protected by Basic Auth. Configure DEPLOY_VERIFY_BASIC_AUTH_USERNAME and DEPLOY_VERIFY_BASIC_AUTH_PASSWORD GitHub secrets for the verify step."
            else
              echo "WordPress API returned 401 even with the configured Basic Auth secrets."
            fi

            exit 1
          fi

          echo "WordPress API returned status: $HTTP_STATUS"
          exit 1
