name: Deploy Backend to InMotion
run-name: >-
  Deploy ${{ github.ref_name }} to InMotion:
  ${{ github.event.head_commit.message }}

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-backend.yml'
      - '.cpanel.yml'
      - 'wp-content/themes/gutenberg-lab-vvm/**'
      - 'wp-content/plugins/gutenberg-lab-blocks/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            set -e

            cd /home/grapsa5/repositories/barbados-escapes
            git fetch origin main
            git checkout main
            git pull origin main

            # Keep these copy paths aligned with the cPanel deploy config.
            export THEMEPATH=/home/grapsa5/barbadosescapes.verseandvision.ca/wp-content/themes/gutenberg-lab-vvm
            mkdir -p $THEMEPATH
            cp -R wp-content/themes/gutenberg-lab-vvm/* $THEMEPATH/

            export PLUGINPATH=/home/grapsa5/barbadosescapes.verseandvision.ca/wp-content/plugins/gutenberg-lab-blocks
            mkdir -p $PLUGINPATH
            cp -R wp-content/plugins/gutenberg-lab-blocks/* $PLUGINPATH/

            echo "Deployment complete."

      - name: Verify Deployment over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          envs: GITHUB_SHA
          script: |
            set -e

            export REPOPATH=/home/grapsa5/repositories/barbados-escapes
            export THEMEPATH=/home/grapsa5/barbadosescapes.verseandvision.ca/wp-content/themes/gutenberg-lab-vvm
            export PLUGINPATH=/home/grapsa5/barbadosescapes.verseandvision.ca/wp-content/plugins/gutenberg-lab-blocks

            cd $REPOPATH
            DEPLOYED_SHA=$(git rev-parse HEAD)

            if [ "$DEPLOYED_SHA" != "$GITHUB_SHA" ]; then
              echo "Server repo SHA mismatch: expected $GITHUB_SHA, got $DEPLOYED_SHA"
              exit 1
            fi

            # Check a few sentinel files so we know the copy step reached both targets.
            test -f "$THEMEPATH/style.css"
            test -f "$THEMEPATH/functions.php"
            test -f "$PLUGINPATH/gutenberg-lab-blocks.php"
            test -d "$PLUGINPATH/build"

            cmp -s "wp-content/themes/gutenberg-lab-vvm/style.css" "$THEMEPATH/style.css"
            cmp -s "wp-content/themes/gutenberg-lab-vvm/functions.php" "$THEMEPATH/functions.php"
            cmp -s "wp-content/plugins/gutenberg-lab-blocks/gutenberg-lab-blocks.php" "$PLUGINPATH/gutenberg-lab-blocks.php"

            echo "Deployment verified on server."
